root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/main ./cmd/api"
bin = "./tmp/main"
include_ext = ["go", "tpl", "tmpl", "html", "env"]
exclude_dir = ["tmp", "vendor", "node_modules", ".git", "testdata", "assets"]
exclude_regex = ["_test.go"]
delay = 1000
stop_on_error = true

[log]
time = true
