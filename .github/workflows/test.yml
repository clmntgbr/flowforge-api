name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.9'
          cache-dependency-path: go.sum

      - name: Run tests with coverage
        run: |
          go test ./tests/handler_test -v -count=1 \
            -coverprofile=coverage.txt \
            -covermode=set \
            -coverpkg=./handler

      - name: Add coverage to job summary
        run: |
          {
            echo '## Coverage'
            echo ''
            echo 'Statements in `handler` measured via `tests/handler_test`.'
            echo ''
            echo '```'
            go tool cover -func=coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.txt

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.txt
          fail_ci_if_error: false

      - name: Update handler test count badge data
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          COUNT=$(go test -list . ./tests/handler_test 2>/dev/null | grep -c '^Test' || echo 0)
          mkdir -p badges
          jq -cn \
            --argjson schemaVersion 1 \
            --arg label "handler tests" \
            --arg message "$COUNT" \
            --arg color brightgreen \
            '{schemaVersion: $schemaVersion, label: $label, message: $message, color: $color}' \
            > badges/handler-tests.json

      - name: Commit badge update
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add badges/handler-tests.json
          if git diff --staged --quiet; then
            echo "Badge data unchanged."
          else
            git commit -m "chore: update handler test count badge [skip ci]"
            git push
          fi
